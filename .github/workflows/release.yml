name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            package_kind: windows-portable
          - platform: macos-15-intel
            target: x86_64-apple-darwin
            package_kind: macos-dmg
            arch: x64
            optional: true
          - platform: macos-latest
            target: aarch64-apple-darwin
            package_kind: macos-dmg
            arch: arm64
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            package_kind: linux-bundles

    runs-on: ${{ matrix.platform }}
    continue-on-error: ${{ matrix.optional || false }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install pnpm and dependencies
        run: |
          npm install -g pnpm
          pnpm install --frozen-lockfile
          pnpm remove sharp png-to-ico

      - name: Build
        shell: bash
        run: |
          case "${{ matrix.package_kind }}" in
            windows-portable)
              pnpm tauri build --target ${{ matrix.target }} --no-bundle
              ;;
            macos-dmg)
              pnpm tauri build --target ${{ matrix.target }} --bundles dmg
              ;;
            linux-bundles)
              pnpm tauri build --target ${{ matrix.target }} --bundles appimage,deb
              ;;
            *)
              echo "Unknown package kind: ${{ matrix.package_kind }}" >&2
              exit 1
              ;;
          esac

      - name: Prepare release assets
        shell: bash
        run: |
          mkdir -p artifact

          case "${{ matrix.package_kind }}" in
            windows-portable)
              cp "src-tauri/target/${{ matrix.target }}/release/api-switch.exe" \
                "artifact/api-switch-${{ github.ref_name }}-windows-x64.exe"
              ;;
            macos-dmg)
              dmg_path="$(find "src-tauri/target/${{ matrix.target }}/release/bundle/dmg" -maxdepth 1 -type f -name '*.dmg' -print -quit)"
              test -n "$dmg_path"
              cp "$dmg_path" "artifact/api-switch-${{ github.ref_name }}-macos-${{ matrix.arch }}.dmg"
              ;;
            linux-bundles)
              appimage_path="$(find "src-tauri/target/${{ matrix.target }}/release/bundle/appimage" -maxdepth 1 -type f -name '*.AppImage' -print -quit)"
              deb_path="$(find "src-tauri/target/${{ matrix.target }}/release/bundle/deb" -maxdepth 1 -type f -name '*.deb' -print -quit)"
              test -n "$appimage_path"
              test -n "$deb_path"
              cp "$appimage_path" "artifact/api-switch-${{ github.ref_name }}-linux-x64.AppImage"
              cp "$deb_path" "artifact/api-switch-${{ github.ref_name }}-linux-x64.deb"
              ;;
            *)
              echo "Unknown package kind: ${{ matrix.package_kind }}" >&2
              exit 1
              ;;
          esac

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: artifact/*

  publish:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: true
          name: ${{ github.ref_name }}
          body: |
            ## API Switch ${{ github.ref_name }}

            Download the package for your platform:

            - `api-switch-${{ github.ref_name }}-windows-x64.exe` — Windows
            - `api-switch-${{ github.ref_name }}-macos-x64.dmg` — macOS Intel
            - `api-switch-${{ github.ref_name }}-macos-arm64.dmg` — macOS Apple Silicon
            - `api-switch-${{ github.ref_name }}-linux-x64.AppImage` — Linux portable bundle
            - `api-switch-${{ github.ref_name }}-linux-x64.deb` — Debian/Ubuntu package

            ### Usage
            1. Download the package for your platform
            2. App data is auto-created on first launch
            3. Point your client to `http://127.0.0.1:9090`
