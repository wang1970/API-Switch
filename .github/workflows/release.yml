name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: api-switch.exe
            asset: api-switch-windows-x64.exe
          - platform: macos-latest
            target: x86_64-apple-darwin
            artifact: api-switch
            asset: api-switch-macos-x64
          - platform: macos-latest
            target: aarch64-apple-darwin
            artifact: api-switch
            asset: api-switch-macos-arm64
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: api-switch
            asset: api-switch-linux-x64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm build:renderer

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Linux dependencies
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
        working-directory: src-tauri

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: src-tauri/target/${{ matrix.target }}/release/${{ matrix.artifact }}

  publish:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          draft: true
          name: ${{ github.ref_name }}
          body: |
            ## API Switch ${{ github.ref_name }}

            Portable single-file build. Download for your platform:

            - `api-switch-windows-x64.exe` — Windows
            - `api-switch-macos-x64` — macOS Intel
            - `api-switch-macos-arm64` — macOS Apple Silicon
            - `api-switch-linux-x64` — Linux

            ### Usage
            1. Download and run
            2. Database is auto-created in the same directory
            3. Point your client to `http://127.0.0.1:9090`
